<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas marxista de lectura</title>
    <meta
      name="description"
      content="Una capa de navegacion y estudio sobre Marxists.org."
    >
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div class="topbar__brand">
          <svg class="topbar__logo" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect width="32" height="32" rx="8" fill="#f15c5c" fill-opacity="0.15"/>
            <path d="M8 24 15 8h2l7 16h-3l-1.5-4h-7L11 24zm5.5-7h5L16 10z" fill="#f15c5c"/>
          </svg>
          <span class="topbar__title">Atlas marxista<em> de lectura</em></span>
        </div>
        <nav class="topbar__nav" aria-label="Vistas principales">
          <button type="button" id="nav-temas"   class="topbar__nav-btn topbar__nav-btn--active">Temas</button>
          <button type="button" id="nav-autores"  class="topbar__nav-btn">Autores</button>
          <button type="button" id="nav-mapa"     class="topbar__nav-btn">Mapa</button>
        </nav>
        <p class="topbar__claim">Navega Marxists.org. No lo sustituye.</p>
      </div>
    </header>

    <main class="app" data-view="list">
      <aside class="sidebar">
        <div class="sidebar__search">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.6"/>
            <path d="M13 13l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input id="search-input" type="search" placeholder="Tema, autor, concepto…" autocomplete="off">
        </div>
        <div class="sidebar__works-search">
          <button type="button" id="open-works-search" class="works-search-btn">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.6"/>
              <path d="M13 13l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            Buscar en obras…
          </button>
        </div>

        <div class="sidebar__meta">
          <div class="stats" id="stats"></div>
          <div class="active-filter" id="active-filter" hidden></div>
        </div>

        <div class="theme-list" id="theme-grid" role="list" aria-live="polite"></div>
      </aside>

      <section class="detail" aria-labelledby="detail-title">
        <div id="detail-empty" class="detail__empty">
          <svg viewBox="0 0 48 48" fill="none" aria-hidden="true" width="48" height="48">
            <rect x="6" y="10" width="28" height="34" rx="3" stroke="currentColor" stroke-width="1.6"/>
            <path d="M14 18h12M14 24h8M34 6v8M30 10h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <p>Selecciona un tema para ver autores, obras, debates y rutas de lectura.</p>
        </div>
        <article id="detail-content" hidden></article>
      </section>
    </main>

    <script src="app.js" defer></script>

    <!-- Map view -->
    <div id="map-view" class="map-view" hidden aria-label="Mapa de conexiones entre temas">
      <div class="map-header">
        <div class="map-header__text">
          <h2 class="map-header__title">Mapa de conexiones</h2>
          <p class="map-header__subtitle">Haz clic en un tema para estudiar autores, obras y rutas de lectura</p>
        </div>
        <div class="map-legend" id="map-legend"></div>
      </div>
      <div class="map-canvas" id="map-canvas">
        <svg class="map-svg" id="map-svg" aria-hidden="true"></svg>
      </div>
    </div>

    <!-- Works search modal (Pagefind) -->
    <div id="works-search-modal" class="works-modal" hidden role="dialog" aria-modal="true" aria-label="Buscar en obras">
      <div class="works-modal__overlay" id="works-modal-overlay"></div>
      <div class="works-modal__panel">
        <div class="works-modal__header">
          <h2 class="works-modal__title">Buscar en obras</h2>
          <button type="button" class="works-modal__close" id="close-works-search" aria-label="Cerrar búsqueda">×</button>
        </div>
        <div id="pagefind-search-ui"></div>
      </div>
    </div>
  </body>
</html>
